version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mon_association
      POSTGRES_USER: assoc_user
      POSTGRES_PASSWORD: change_me
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/mon_association"
      SPRING_DATASOURCE_USERNAME: "assoc_user"
      SPRING_DATASOURCE_PASSWORD: "change_me"
      # Admin bootstrap (created on application startup via DataInitializer)
      ADMIN_USERNAME: "admin"
      ADMIN_EMAIL: "mtd779576559@gmail.com"
      ADMIN_PASSWORD: "7h$K3z9q!Bm2Lp8Vx4R%"
      # JWT secret (change immediately in production)
      JWT_SECRET: "mZ8v9Qx2sK4pR7tY6uN1bC5dF0gH3jL9wV2zX7yPqS0"
      JWT_EXPIRATION_MS: "3600000"
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
