server:
  port: 8080
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mon_association}
    username: ${SPRING_DATASOURCE_USERNAME:assoc_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:change_this_secret_for_prod}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

# Admin bootstrap (optional) - set these env vars to auto-create an admin user on startup
admin:
  username: ${ADMIN_USERNAME:}
  email: ${ADMIN_EMAIL:}
  password: ${ADMIN_PASSWORD:}

# Flyway will run migrations from db/migration if present
